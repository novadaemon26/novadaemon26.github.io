---
layout: default
---
<article class="post">
  <h1>{{ page.title }}</h1>
  <div class="post-meta">
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
    {% if page.tags %}
      &nbsp;&middot;&nbsp;
      {% for tag in page.tags %}
        <a href="{{ '/tag/' | append: tag | relative_url }}" class="tag {{ tag }}">{{ tag }}</a>
      {% endfor %}
    {% endif %}
  </div>
  <div class="post-content">
    {{ content }}
  </div>
</article>
